        }
        
        :root {
            --cream: #F7F3E9;

            --paper: #FAF7F0;
            --paper-darker: #F5F2E9;
        }
        
        body {

            background-color: var(--cream);
            color: var(--dark-brown);
            line-height: 1.6;
            background-image:

        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;

            padding: 15px 0;

            max-width: 900px;
            margin: 0 auto;

            justify-content: space-between;

        .logo {
            font-family: 'Old Standard TT', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-brown);
            text-decoration: none;
            letter-spacing: 2px;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }
        
        .nav-links a {
            color: var(--dark-brown);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--gold);
        }
        
        /* Hero Section */
        .hero {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        .hero-image {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }
        
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(3px) brightness(0.7);
            transition: all 0.6s ease;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.6s ease;
        }
        
        .hero-image:hover .background-image {
            filter: blur(0px) brightness(1);
        }
        
        .hero-image:hover .hero-overlay {
            opacity: 0;
        }
        
        .band-name {
            font-family: 'Old Standard TT', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--cream);
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        /* Album Section */
        .album-section {
            padding: 100px 30px;
            text-align: center;
        }

        #album {
            background-color: var(--paper);
        }
        
        .section-title {
            font-family: 'Old Standard TT', serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 60px;
            color: var(--dark-brown);
            letter-spacing: 1px;
        }
        
        .album-announcement {
            background-color: var(--paper);
            border: 2px solid var(--warm-brown);
            padding: 60px 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(60, 42, 30, 0.1);
        }
